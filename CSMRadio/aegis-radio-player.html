<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CSM Aegis Radio — SiblingFrequency — V2 Portable</title>
<style>
:root {
  --brass: #c9a84c;
  --brass-dark: #8b6914;
  --wood: #3d2817;
  --wood-light: #5c3a1e;
  --dial: #1a0a00;
  --glow: #ffd700;
  --text: #f0e6c8;
  --particle-gold: #ffd700;
  --particle-copper: #e8a840;
  --particle-bronze: #cd7f32;
  --particle-silver: #c0c0c0;
  --particle-blue: #4488cc;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0502;
  font-family: 'Georgia', 'Times New Roman', serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

#canvas3d {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}

#ui-layer {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 10;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding: 20px;
}

#display-area {
  pointer-events: auto;
  width: 100%;
  max-width: 700px;
  min-height: 320px;
  background: rgba(10,5,2,0.85);
  border: 3px solid var(--brass);
  border-radius: 18px;
  padding: 18px 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 40px rgba(201,168,76,0.15), inset 0 0 80px rgba(0,0,0,0.6);
  position: relative;
}

.title-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--brass);
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(201,168,76,0.3);
  padding-bottom: 8px;
}

.episode-selector {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}

select {
  background: var(--dial);
  color: var(--text);
  border: 2px solid var(--brass-dark);
  border-radius: 12px;
  padding: 6px 10px;
  font-family: 'Georgia', serif;
  font-size: 12px;
  cursor: pointer;
  max-width: 200px;
  outline: none;
}

select:focus { border-color: var(--glow); box-shadow: 0 0 10px rgba(255,215,0,0.3); }

.controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

button {
  background: linear-gradient(180deg, #5c3a1e 0%, #3d1a08 100%);
  color: var(--brass);
  border: 2px solid var(--brass-dark);
  border-radius: 20px;
  padding: 8px 16px;
  font-family: 'Georgia', serif;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
  pointer-events: auto;
  text-shadow: 0 1px 2px rgba(0,0,0,0.8);
}

button:hover {
  background: linear-gradient(180deg, #7a4a2a 0%, #5c2a10 100%);
  border-color: var(--glow);
  box-shadow: 0 0 15px rgba(255,215,0,0.2);
}

button.active {
  background: linear-gradient(180deg, #8b6914 0%, #c9a84c 100%);
  color: #1a0a00;
  border-color: var(--glow);
}

button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

#now-playing {
  color: var(--text);
  font-size: 14px;
  font-style: italic;
  min-height: 20px;
  text-align: center;
  opacity: 0.9;
}

#word-display {
  color: var(--brass);
  font-size: 28px;
  font-weight: bold;
  text-align: center;
  min-height: 40px;
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(255,215,0,0.3);
  transition: all 0.15s;
}

#stats {
  display: flex;
  justify-content: space-around;
  color: rgba(240,230,200,0.6);
  font-size: 10px;
  letter-spacing: 1px;
}

.menu-toggle {
  position: absolute;
  left: -16px;
  top: 50%;
  transform: translateY(-50%);
  width: 30px;
  height: 50px;
  background: var(--wood);
  border: 2px solid var(--brass-dark);
  border-radius: 0 10px 10px 0;
  color: var(--brass);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 11;
}

#display-area.menu-hidden .title-bar,
#display-area.menu-hidden .episode-selector,
#display-area.menu-hidden .controls,
#display-area.menu-hidden #stats {
  display: none;
}
#display-area.menu-hidden {
  min-height: auto;
  padding: 12px;
}
#display-area.menu-hidden #now-playing { margin: 0; }
#display-area.menu-hidden #word-display { font-size: 20px; }

@media (max-width: 600px) {
  #display-area { padding: 10px 14px; min-height: 260px; }
  #word-display { font-size: 20px; }
  button { padding: 6px 12px; font-size: 11px; }
  .title-bar { font-size: 10px; }
}
@media (orientation: landscape) and (max-height: 500px) {
  #display-area { min-height: 200px; flex-direction: row; flex-wrap: wrap; gap: 4px; }
  #word-display { font-size: 16px; width: 100%; }
}
</style>
</head>
<body>

<div id="canvas3d"></div>

<div id="ui-layer">
  <div id="display-area">
    <div class="menu-toggle" id="menuToggle" title="Hide/Show Menu">◀</div>
    <div class="title-bar">
      <span>⚡ AEGIS RADIO ⚡</span>
      <span id="clock">SiblingFrequency</span>
    </div>
    <div class="episode-selector">
      <select id="episodeSelect" title="Choose Episode"><option value="">Loading episodes...</option></select>
      <select id="voiceSelect" title="Choose Voice"><option value="">Default Voice</option></select>
    </div>
    <div class="controls">
      <button id="btnPlay" title="Play">▶ PLAY</button>
      <button id="btnPrev" title="Previous Segment">⏮</button>
      <button id="btnNext" title="Next Segment">⏭</button>
      <button id="btnStop" title="Stop">■ STOP</button>
      <button id="btnScreen" title="Keep Screen On">📱 AWAKE</button>
      <button id="btnSleep" title="Prevent Sleep">💤 NOSLEEP</button>
    </div>
    <div id="now-playing">Tune in...</div>
    <div id="word-display"></div>
    <div id="stats">
      <span id="statEpisodes">Episodes: --</span>
      <span id="statCommercials">Commercials: --</span>
      <span id="statPlaying">Ready</span>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ──────────────────────────────────────
// STATE
// ──────────────────────────────────────
let episodes = [];
let commercials = [];
let currentEpisodeIndex = -1;
let currentCommercialPool = [];
let isPlaying = false;
let isPaused = false;
let skipLocked = false;
let currentUtterance = null;
let currentSegmentIndex = 0;
let currentEpisodeContent = '';
let episodeSegments = [];
let screenLocked = false;
let sleepLocked = false;
let wakeLock = null;
let selectedVoice = null;
let spokenWords = '';
let particleTime = 0;
let targetParticleEnergy = 0.5;
let currentParticleEnergy = 0.5;

// ──────────────────────────────────────
// THREE.JS SCENE — 1920s Radio Wireframe
// ──────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.3, 80);
camera.position.set(0, 1.8, 5.5);
camera.lookAt(0, 0.4, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.getElementById('canvas3d').appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0x332211, 1.2);
scene.add(ambientLight);
const dialLight = new THREE.PointLight(0xffd700, 2.5, 8, 1.2);
dialLight.position.set(0, 0.6, 2.2);
scene.add(dialLight);
const topLight = new THREE.PointLight(0xc9a84c, 1.2, 6, 1.5);
topLight.position.set(0, 2.2, 1);
scene.add(topLight);
const warmLight = new THREE.PointLight(0xe8a840, 0.8, 4, 2);
warmLight.position.set(-2, 0.3, 2.5);
scene.add(warmLight);

// ── 1920s Cathedral Radio — flat front, realistic proportions ──
const radioGroup = new THREE.Group();
const walnutMat = new THREE.MeshStandardMaterial({ color: 0x3d2010, roughness: 0.5, metalness: 0.03 });
const walnutDark = new THREE.MeshStandardMaterial({ color: 0x2a1508, roughness: 0.45, metalness: 0.05 });
const walnutLight = new THREE.MeshStandardMaterial({ color: 0x4a2a15, roughness: 0.55, metalness: 0.02 });
const brassMat = new THREE.MeshStandardMaterial({ color: 0xc9a84c, roughness: 0.3, metalness: 0.92 });
const brassBright = new THREE.MeshStandardMaterial({ color: 0xe8c860, roughness: 0.25, metalness: 0.95, emissive: 0x1a1000, emissiveIntensity: 0.3 });
const dialFaceMat = new THREE.MeshStandardMaterial({ color: 0xf5e6c0, roughness: 0.4, metalness: 0.05, emissive: 0x441800, emissiveIntensity: 0.6, transparent: true, opacity: 0.85 });
const grilleCloth = new THREE.MeshStandardMaterial({ color: 0x8b7355, roughness: 0.9, metalness: 0.0, transparent: true, opacity: 0.9 });
const bakeliteMat = new THREE.MeshStandardMaterial({ color: 0x1a0a00, roughness: 0.35, metalness: 0.08 });
const tubeGlow = new THREE.MeshStandardMaterial({ color: 0xff8830, roughness: 0.1, emissive: 0xff6610, emissiveIntensity: 0.9, transparent: true, opacity: 0.85 });

// ── BASE & FEET ──
const baseGeom = new THREE.BoxGeometry(2.7, 0.08, 0.7);
const baseMesh = new THREE.Mesh(baseGeom, walnutDark);
baseMesh.position.y = -0.75;
radioGroup.add(baseMesh);

const footGeom = new THREE.BoxGeometry(2.82, 0.04, 0.78);
const footMesh = new THREE.Mesh(footGeom, walnutDark);
footMesh.position.y = -0.81;
radioGroup.add(footMesh);

for (let i = 0; i < 4; i++) {
  const footPillar = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.08, 12), brassMat);
  footPillar.position.set((i < 2 ? -1.1 : 1.1), -0.83, (i % 2 === 0 ? -0.22 : 0.22));
  radioGroup.add(footPillar);
}

// ── MAIN BODY — thin, flat front panel ──
const bodyGeom = new THREE.BoxGeometry(2.6, 1.3, 0.55);
const bodyMesh = new THREE.Mesh(bodyGeom, walnutMat);
bodyMesh.position.y = -0.08;
radioGroup.add(bodyMesh);

// Side shoulder wings — subtle tombstone shoulders
for (let side = -1; side <= 1; side += 2) {
  const shoulderGeom = new THREE.BoxGeometry(0.12, 0.5, 0.55);
  const shoulderMesh = new THREE.Mesh(shoulderGeom, walnutLight);
  shoulderMesh.position.set(side * 1.36, 0.35, 0);
  radioGroup.add(shoulderMesh);
}

// ── CATHEDRAL ARCH — flatter bezier top ──
const archShape = new THREE.Shape();
archShape.moveTo(-1.3, 0.55);
archShape.lineTo(-1.3, 0.85);
archShape.bezierCurveTo(-1.3, 1.2, -0.5, 1.45, 0, 1.48);
archShape.bezierCurveTo(0.5, 1.45, 1.3, 1.2, 1.3, 0.85);
archShape.lineTo(1.3, 0.55);
archShape.lineTo(-1.3, 0.55);

const archExtrude = new THREE.ExtrudeGeometry(archShape, { steps: 1, depth: 0.57, bevelEnabled: true, bevelThickness: 0.03, bevelSize: 0.03, bevelSegments: 3 });
const archMesh = new THREE.Mesh(archExtrude, walnutMat);
archMesh.position.set(0, 0.55, -0.285);
radioGroup.add(archMesh);

// ── SUNBURST SPEAKER GRILLE — radial Art Deco ──
const grilleBase = new THREE.Mesh(new THREE.CircleGeometry(0.48, 48), grilleCloth);
grilleBase.position.set(0.52, 0.1, 0.3);
radioGroup.add(grilleBase);

for (let i = 0; i < 16; i++) {
  const angle = (i / 16) * Math.PI * 2;
  const barGeom = new THREE.BoxGeometry(0.015, 0.38, 0.01);
  const bar = new THREE.Mesh(barGeom, walnutDark);
  bar.position.set(0.52 + Math.cos(angle) * 0.22, 0.1 + Math.sin(angle) * 0.22, 0.3);
  bar.rotation.z = angle;
  radioGroup.add(bar);
}

for (let r = 0; r < 3; r++) {
  const ringGeom = new THREE.TorusGeometry(0.1 + r * 0.14, 0.006, 8, 40);
  const ring = new THREE.Mesh(ringGeom, walnutDark);
  ring.position.set(0.52, 0.1, 0.31);
  radioGroup.add(ring);
}

const grilleFrame = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.02, 12, 40), brassMat);
grilleFrame.position.set(0.52, 0.1, 0.31);
radioGroup.add(grilleFrame);

// ── ILLUMINATED DIAL — amber edge-lit ──
const dialFace = new THREE.Mesh(new THREE.CircleGeometry(0.32, 48), dialFaceMat);
dialFace.position.set(-0.55, 0.3, 0.3);
radioGroup.add(dialFace);

// Station dots
for (let m = 0; m < 4; m++) {
  const markAngle = -1.8 + m * 1.2;
  const dot = new THREE.Mesh(new THREE.SphereGeometry(0.01, 6, 6), brassBright);
  dot.position.set(-0.55 + Math.cos(markAngle) * 0.22, 0.3 + Math.sin(markAngle) * 0.22, 0.31);
  radioGroup.add(dot);
}

const dialRing = new THREE.Mesh(new THREE.TorusGeometry(0.33, 0.02, 12, 40), brassMat);
dialRing.position.set(-0.55, 0.3, 0.31);
radioGroup.add(dialRing);

// Dial needle — slow gentle sweep
const needleBase = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.006, 0.3, 8), brassBright);
needleBase.position.set(-0.55, 0.3, 0.32);
radioGroup.add(needleBase);
radioGroup.userData.needle = needleBase;

const needleTip = new THREE.Mesh(new THREE.SphereGeometry(0.014, 6, 6), brassBright);
needleTip.position.set(-0.25, 0.3, 0.32);
radioGroup.add(needleTip);
radioGroup.userData.needleTip = needleTip;

// ── BAKELITE KNOBS — three fluted controls ──
const knobPositions = [
  { x: -1.0, label: 'VOL' },
  { x: -0.55, label: 'TUNE' },
  { x: -0.1, label: 'TONE' },
];
knobPositions.forEach((kp) => {
  const knobGeom = new THREE.CylinderGeometry(0.08, 0.09, 0.08, 20);
  const knob = new THREE.Mesh(knobGeom, bakeliteMat);
  knob.position.set(kp.x, -0.42, 0.3);
  knob.rotation.x = Math.PI / 2;
  radioGroup.add(knob);
  
  // Fluting lines
  for (let f = 0; f < 8; f++) {
    const flAngle = (f / 8) * Math.PI * 2;
    const flute = new THREE.Mesh(new THREE.BoxGeometry(0.008, 0.02, 0.004), brassMat);
    flute.position.set(kp.x + Math.cos(flAngle) * 0.085, -0.42 + Math.sin(flAngle) * 0.085, 0.34);
    radioGroup.add(flute);
  }

  const labelGeom = new THREE.PlaneGeometry(0.08, 0.03);
  const labelPlate = new THREE.Mesh(labelGeom, brassMat);
  labelPlate.position.set(kp.x, -0.26, 0.32);
  radioGroup.add(labelPlate);
});

// ── TUBE GLOW — visible through grille ──
for (let t = 0; t < 2; t++) {
  const tube = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.14, 10), tubeGlow);
  tube.position.set(0.52, -0.3 + t * 0.35, 0.2);
  radioGroup.add(tube);
}

// ── ANTENNA — twin V-wires ──
for (let i = 0; i < 2; i++) {
  const insGeom = new THREE.CylinderGeometry(0.02, 0.02, 0.08, 8);
  const insulator = new THREE.Mesh(insGeom, new THREE.MeshStandardMaterial({ color: 0xfafaf5, roughness: 0.3 }));
  insulator.position.set(-0.08 + i * 0.16, -0.2, 0.05);
  radioGroup.add(insulator);
}
for (let i = 0; i < 2; i++) {
  const points = [
    new THREE.Vector3(-0.08 + i * 0.16, -0.15, 0.05),
    new THREE.Vector3(-0.25 + i * 0.15, 1.6, 0.6),
    new THREE.Vector3(-0.4 + i * 0.1, 2.4, 1.2),
  ];
  const antGeom = new THREE.BufferGeometry().setFromPoints(points);
  const antWire = new THREE.Line(antGeom, new THREE.LineBasicMaterial({ color: 0xc9a84c, transparent: true, opacity: 0.5 }));
  radioGroup.add(antWire);
}

// ── BRAND BADGE ──
const badgeBack = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.06, 0.02), brassMat);
badgeBack.position.set(-0.55, 0.62, 0.32);
radioGroup.add(badgeBack);

// ── PILOT LIGHT ──
const pilotLight = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff8820, roughness: 0.1, emissive: 0xff6610, emissiveIntensity: 1.2 }));
pilotLight.position.set(-1.02, -0.02, 0.3);
radioGroup.add(pilotLight);

scene.add(radioGroup);

// ── PARTICLE SYSTEM — Swimming school of light with frequency tails ──
const particleCount = 500;
const particleGeom = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleColors = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);
const particleHome = new Float32Array(particleCount * 3);
const particlePhase = new Float32Array(particleCount);
const particleGroup = new Float32Array(particleCount);

const particleColorsArr = [
  [1.0, 0.50, 0.05],   // Radium orange
  [1.0, 0.22, 0.05],   // Deep radium red
  [0.15, 0.85, 0.25],  // Uranium green
  [1.0, 0.75, 0.10],   // Glowing amber
  [0.95, 0.40, 0.05],  // Copper-radium glow
  [0.08, 0.68, 0.88],  // Cherenkov blue
  [0.18, 0.90, 0.40],  // Bright radium green
  [1.0, 0.85, 0.35],   // Warm candle-radium
];

// Create particles in nested orbital rings (like electron clouds around the radio)
for (let i = 0; i < particleCount; i++) {
  const ringN = Math.floor(i / 100); // 5 rings of 100 particles each
  const baseRadius = 1.5 + ringN * 0.55;
  const baseY = 0.1 + (Math.random() - 0.5) * 0.8 * (ringN + 1);
  const angle = Math.random() * Math.PI * 2;
  
  const x = Math.cos(angle) * baseRadius;
  const y = baseY;
  const z = Math.sin(angle) * baseRadius * 0.6;
  
  particleHome[i*3] = x;
  particleHome[i*3+1] = y;
  particleHome[i*3+2] = z;
  particlePositions[i*3] = x;
  particlePositions[i*3+1] = y;
  particlePositions[i*3+2] = z;

  const colorChoice = particleColorsArr[ringN % particleColorsArr.length];
  particleColors[i*3] = colorChoice[0];
  particleColors[i*3+1] = colorChoice[1];
  particleColors[i*3+2] = colorChoice[2];

  particleSizes[i] = 0.018 + Math.random() * 0.04;
  particlePhase[i] = Math.random() * Math.PI * 2;
  particleGroup[i] = ringN;
}

particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeom.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
particleGeom.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

const particleMat = new THREE.PointsMaterial({
  size: 0.045,
  vertexColors: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true,
  opacity: 0.75,
});
const particles = new THREE.Points(particleGeom, particleMat);
scene.add(particles);

// ── Frequency wave tails — thin glowing rings that pulse with speech ──
const tailRings = [];
for (let r = 0; r < 4; r++) {
  const ringGeom = new THREE.TorusGeometry(1.7 + r * 0.55, 0.012, 16, 80);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.15 });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.rotation.x = Math.PI / 2 + (Math.random() - 0.5) * 0.4;
  ring.position.y = 0.2;
  ring.userData.baseOpacity = 0.08 + r * 0.03;
  ring.userData.radius = 1.7 + r * 0.55;
  scene.add(ring);
  tailRings.push(ring);
}

// GitHub raw URL — the HTML player loads all content exclusively from here
// So you can open this file from anywhere: phone, desktop, any folder — it just works
const GITHUB_RAW = 'https://raw.githubusercontent.com/ZirconiaAegisC/CarrPod/main/CSMRadio/';


// ──────────────────────────────────────
// KNOWN EPISODE MANIFEST — clean ep-XX.md naming
// ──────────────────────────────────────
const EPISODE_MANIFEST = [
  { file: 'ep-00.md', num: 0,  title: 'PROLOGUE — The Sibling Frequency Opening Broadcast' },
  { file: 'ep-01.md', num: 1,  title: 'The Signal — Sun, CMEs, and the Carrington Threat' },
  { file: 'ep-02.md', num: 2,  title: 'The Cascade — Aegis-C Composite Shielding' },
  { file: 'ep-03.md', num: 3,  title: 'The Response — Microgrids and Community Resilience' },
  { file: 'ep-04.md', num: 4,  title: 'The Long Night — First 168 Hours of a Carrington Event' },
  { file: 'ep-05.md', num: 5,  title: 'Baker Street Adjuster Commentary — Agent-19 Insurance' },
  { file: 'ep-06.md', num: 6,  title: 'The Restoration — Rebuilding Civilization After the Grid' },
  { file: 'ep-07.md', num: 7,  title: 'Spruce-Drake Frequency — 35-Trait Deep Persona Protocol' },
  { file: 'ep-08.md', num: 8,  title: 'Zirconia Directors Cut — Operational Architecture' },
  { file: 'ep-09.md', num: 9,  title: 'The Charge Gap — SOLARA at Barstow EV Charging Corridor' },
  { file: 'ep-10.md', num: 10, title: 'The Open Hand — Pocket Watch X and Modular Standards' },
  { file: 'ep-11.md', num: 11, title: 'The Feathers in the Wind — FEATHER LoRa Mesh Deployment' },
  { file: 'ep-12.md', num: 12, title: 'The Fleet That Walks — Charlemagne Vibration Trials at Sea' },
  { file: 'ep-13.md', num: 13, title: 'The Sky Pays Its Debts — Taurid Swarm and Disaster Cycles' },
  { file: 'ep-14.md', num: 14, title: 'The Joy Frequency — Party Episode with Pet-Safe Liner' },

async function loadEpisode(filename) {
  currentEpisodeContent = '';
  episodeSegments = [];
  
  // Load exclusively from GitHub raw — this HTML is designed to work anywhere
  const url = GITHUB_RAW + 'sf-episodes/' + filename;
  
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    if (text.length < 100) throw new Error('Content too short');
    currentEpisodeContent = text;
  } catch(e) {
    currentEpisodeContent = "Connecting to broadcast... Please wait. If this persists, check your internet connection.";
    episodeSegments = [currentEpisodeContent];
    document.getElementById('statPlaying').textContent = '⚠ Loading...';
    return;
  }
  
  // Split into segments on markdown headers or double newlines
  const parts = currentEpisodeContent.split(/\n\n(?=#)/).filter(s => s.trim().length > 40);
  if (parts.length >= 3) {
    episodeSegments = parts;
  } else {
    episodeSegments = currentEpisodeContent.split(/\n\n/).filter(s => s.trim().length > 50);
  }
  if (episodeSegments.length === 0) {
    episodeSegments = [currentEpisodeContent];
  }
  
  currentSegmentIndex = 0;
  
  // Extract title from content
  const epEntry = EPISODE_MANIFEST.find(e => e.file === filename);
  if (epEntry) {
    document.getElementById('now-playing').textContent = `📻 Ep ${epEntry.num}: ${epEntry.title}`;
  }
}

async function loadCommercials() {
  const batchDirs = ['BATCH-001', 'BATCH-002', 'BATCH-003', 'BATCH-004', 'BATCH-005', 'BATCH-006', 'BATCH-007', 'BATCH-008', 'BATCH-009'];
  const dir = batchDirs[Math.floor(Math.random() * batchDirs.length)];
  const baseUrl = GITHUB_RAW + 'CSMCommercials/' + dir + '/';
  
  try {
    const dirResp = await fetch(baseUrl);
    if (!dirResp.ok) return [];
    const dirText = await dirResp.text();
    const parser = new DOMParser();
    const dirDoc = parser.parseFromString(dirText, 'text/html');
    const links = [...dirDoc.querySelectorAll('a')].map(a => a.textContent);
    const batchFile = links.find(l => l.endsWith('.md')) || '';
    if (!batchFile) return [];
    
    const resp = await fetch(baseUrl + batchFile);
    if (!resp.ok) return [];
    const text = await resp.text();
    const spots = text.split(/^##\s+COMM-/m).filter(s => s.trim().length > 60);
    if (spots.length === 0) {
      const altSpots = text.split(/^---$/m).filter(s => s.trim().length > 60);
      return altSpots.map(s => s.trim());
    }
    return spots.map(s => 'COMM-' + s.trim());
  } catch(e) { return []; }
}

function speak(text, onEnd, onWord) {
  return new Promise((resolve) => {
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    if (selectedVoice) utterance.voice = selectedVoice;
    utterance.rate = 0.92;
    utterance.pitch = 1.02;
    utterance.volume = 0.9;
    currentUtterance = utterance;

    // Track words for particle animation
    let wordIndex = 0;
    const words = text.split(/\s+/);
    
    utterance.onboundary = (event) => {
      if (event.charIndex !== undefined && words.length > 0) {
        wordIndex = Math.min(Math.floor(event.charIndex / 5), words.length - 1);
        const word = words[wordIndex] || '';
        spokenWords = word;
        document.getElementById('word-display').textContent = word;
        targetParticleEnergy = 0.6 + Math.random() * 0.9;
        if (onWord) onWord(word);
      }
    };

    utterance.onend = () => {
      currentUtterance = null;
      document.getElementById('word-display').textContent = '';
      targetParticleEnergy = 0.3;
      resolve();
      if (onEnd) onEnd();
    };

    utterance.onerror = (e) => {
      if (e.error !== 'interrupted' && e.error !== 'canceled') {
        console.error('Speech error:', e);
      }
      currentUtterance = null;
      targetParticleEnergy = 0.3;
      resolve();
    };

    speechSynthesis.speak(utterance);
  });
}

async function getNextCommercial() {
  if (currentCommercialPool.length === 0) {
    currentCommercialPool = await loadCommercials();
    if (currentCommercialPool.length === 0) return "Aegis Certified products available now on the Carr-Forge. The shield is not a product. The shield is the philosophy.";
    // Shuffle
    for (let i = currentCommercialPool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [currentCommercialPool[i], currentCommercialPool[j]] = [currentCommercialPool[j], currentCommercialPool[i]];
    }
  }
  // Get a commercial, try to find one not voiced by a conflicting agent
  const next = currentCommercialPool.shift();
  // Parse out just the commercial text (strip COMM- prefix and agent suffix)
  let adText = next.replace(/^COMM-[A-Za-z0-9]+-/, '').replace(/-[A-Z]+$/, '').trim();
  if (adText.length < 40) adText = "Preparedness products from Carrington Storm Motors. Open source. Open spec. Carr-Forge available now.";
  return `🎙 COMMERCIAL: ${adText}`;
}

let playQueue = [];
let queueIndex = 0;

async function buildPlayQueue() {
  playQueue = [];
  for (let i = 0; i < episodeSegments.length; i++) {
    playQueue.push({ type: 'segment', text: episodeSegments[i], index: i });
    if (i < episodeSegments.length - 1) {
      const adText = await getNextCommercial();
      playQueue.push({ type: 'commercial', text: adText });
    }
  }
  queueIndex = 0;
}

async function processQueue() {
  if (!isPlaying || queueIndex >= playQueue.length) {
    // Episode finished, loop to next
    if (isPlaying) {
      const sel = document.getElementById('episodeSelect');
      const idx = sel.selectedIndex;
      if (idx < sel.options.length - 1) {
        sel.selectedIndex = idx + 1;
        await startEpisode(sel.value);
      } else {
        sel.selectedIndex = 1; // wrap to first episode
        if (sel.options[1]) await startEpisode(sel.options[1].value);
      }
    }
    return;
  }

  const item = playQueue[queueIndex];
  document.getElementById('statPlaying').textContent = item.type === 'commercial' ? '📢 Commercial' : `📻 Segment ${item.index + 1}/${episodeSegments.length}`;
  
  // Add a small indicator for commercial vs episode
  const prefix = item.type === 'commercial' ? '🔶 ' : '';

  await speak(prefix + item.text, null, (word) => {
    // Word callback updates particles via targetParticleEnergy
    if (word) targetParticleEnergy = 0.5 + (word.length / 8) * 1.2;
  });

  queueIndex++;
  if (isPlaying) {
    // Small pause between segments
    await new Promise(r => setTimeout(r, 800));
    processQueue();
  }
}

async function startEpisode(filename) {
  speechSynthesis.cancel();
  isPlaying = true;
  isPaused = false;
  document.getElementById('btnPlay').textContent = '⏸ PAUSE';
  document.getElementById('btnPlay').classList.add('active');
  
  await loadEpisode(filename);
  currentCommercialPool = [];
  await buildPlayQueue();
  queueIndex = 0;
  
  document.getElementById('statPlaying').textContent = '▶ Playing';
  processQueue();
}

function stopPlayback() {
  isPlaying = false;
  isPaused = false;
  speechSynthesis.cancel();
  currentUtterance = null;
  document.getElementById('btnPlay').textContent = '▶ PLAY';
  document.getElementById('btnPlay').classList.remove('active');
  document.getElementById('statPlaying').textContent = '⏹ Stopped';
  document.getElementById('word-display').textContent = '';
  document.getElementById('now-playing').textContent = 'Tune in...';
  targetParticleEnergy = 0.3;
}

function skipForward() {
  if (!isPlaying || playQueue.length === 0 || skipLocked) return;
  skipLocked = true;
  speechSynthesis.cancel();
  currentUtterance = null;
  let next = queueIndex + 1;
  while (next < playQueue.length && playQueue[next].type === 'commercial') next++;
  if (next >= playQueue.length) { skipLocked = false; stopPlayback(); return; }
  queueIndex = next;
  document.getElementById('statPlaying').textContent = `📻 Segment ${playQueue[next].index + 1}/${episodeSegments.length}`;
  setTimeout(() => { skipLocked = false; if (isPlaying) processQueue(); }, 300);
}

function skipBackward() {
  if (!isPlaying || playQueue.length === 0 || skipLocked) return;
  skipLocked = true;
  speechSynthesis.cancel();
  currentUtterance = null;
  let prev = queueIndex - 1;
  while (prev >= 0 && playQueue[prev].type === 'commercial') prev--;
  if (prev < 0) prev = 0;
  queueIndex = prev;
  document.getElementById('statPlaying').textContent = `📻 Segment ${playQueue[prev].index + 1}/${episodeSegments.length}`;
  setTimeout(() => { skipLocked = false; if (isPlaying) processQueue(); }, 300);
}

function skipBackward() {
  if (!isPlaying || playQueue.length === 0) return;
  speechSynthesis.cancel();
  currentUtterance = null;
  let prev = queueIndex - 1;
  while (prev >= 0 && playQueue[prev].type === 'commercial') prev--;
  if (prev < 0) prev = 0;
  queueIndex = prev;
  document.getElementById('statPlaying').textContent = `📻 Segment ${playQueue[prev].index + 1}/${episodeSegments.length}`;
  setTimeout(() => processQueue(), 150);
}

function togglePause() {
  if (!isPlaying) return;
  if (isPaused) {
    speechSynthesis.resume();
    isPaused = false;
    document.getElementById('btnPlay').textContent = '⏸ PAUSE';
    document.getElementById('statPlaying').textContent = '▶ Playing';
    targetParticleEnergy = 0.6;
  } else {
    speechSynthesis.pause();
    isPaused = true;
    document.getElementById('btnPlay').textContent = '▶ RESUME';
    document.getElementById('statPlaying').textContent = '⏸ Paused';
    targetParticleEnergy = 0.2;
  }
}

// ──────────────────────────────────────
// DRAG-TO-ROTATE — touch the radio to spin it
// ──────────────────────────────────────
let isDragging = false, prevMouseX = 0, prevMouseY = 0;
let targetRotY = 0, targetRotX = 0;

renderer.domElement.addEventListener('pointerdown', (e) => {
  isDragging = true;
  prevMouseX = e.clientX;
  prevMouseY = e.clientY;
});
window.addEventListener('pointerup', () => { 
  if (isDragging && radioGroup.userData._spinSpeed !== undefined) {
    const flickDX = prevMouseX; // Use last drag direction
    radioGroup.userData._spinSpeed += (prevMouseX - (prevMouseX - (Math.abs(prevMouseX) < 5 ? 0 : prevMouseX * 0.01))) * 0.0005;
  }
  isDragging = false; 
});
window.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouseX;
  const dy = e.clientY - prevMouseY;
  targetRotY += dx * 0.008;
  targetRotX += dy * 0.005;
  targetRotX = Math.max(-0.4, Math.min(0.4, targetRotX));
  prevMouseX = e.clientX;
  prevMouseY = e.clientY;
});
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  particleTime += dt;

  // Smooth particle energy transition — much gentler
  currentParticleEnergy += (targetParticleEnergy - currentParticleEnergy) * 2.5 * dt;

  // Update particles — swimming, spring-pulled toward home positions
  const pos = particles.geometry.attributes.position.array;
  const sizes = particles.geometry.attributes.size.array;
  const cols = particles.geometry.attributes.color.array;

  const swimSpeed = 0.25 + currentParticleEnergy * 0.6;  // Slow, graceful orbit
  const springStrength = 0.8;  // Pull back to home position
  const wanderAmp = 0.15 + currentParticleEnergy * 0.3;

  for (let i = 0; i < particleCount; i++) {
    const hx = particleHome[i*3];
    const hy = particleHome[i*3+1];
    const hz = particleHome[i*3+2];
    const phase = particlePhase[i];
    const group = particleGroup[i];

    // Gentle orbital drift — all particles swim in the same CCW direction
    const homeRadius = Math.sqrt(hx*hx + hz*hz);
    const homeAngle = Math.atan2(hz, hx);
    const orbitAngle = homeAngle + particleTime * swimSpeed * (1 + group * 0.1);
    
    // Target position: orbiting home + gentle sine wave in Y
    const tx = Math.cos(orbitAngle) * homeRadius;
    const ty = hy + Math.sin(particleTime * 0.6 + phase) * 0.12;
    const tz = Math.sin(orbitAngle) * homeRadius;

    // Spring physics — pull current position toward target
    const dx = tx - pos[i*3];
    const dy = ty - pos[i*3+1];
    const dz = tz - pos[i*3+2];
    
    pos[i*3] += dx * springStrength * dt;
    pos[i*3+1] += dy * springStrength * dt;
    pos[i*3+2] += dz * springStrength * dt;

    // Gentle wander for organic feel
    const wx = Math.sin(particleTime * 1.3 + phase * 3.7) * wanderAmp;
    const wz = Math.cos(particleTime * 1.1 + phase * 2.3) * wanderAmp;
    pos[i*3] += wx * dt;
    pos[i*3+2] += wz * dt;

    // Size — subtle pulse with speech energy, no randomness each frame
    sizes[i] = (0.015 + (group * 0.006)) + currentParticleEnergy * 0.04;

    // Color — warm shift with energy, less intense
    const ci = Math.floor(group % particleColorsArr.length);
    const bc = particleColorsArr[ci];
    cols[i*3] = bc[0] * (0.7 + currentParticleEnergy * 0.35);
    cols[i*3+1] = bc[1] * (0.65 + currentParticleEnergy * 0.3);
    cols[i*3+2] = bc[2] * (0.55 + currentParticleEnergy * 0.25);
  }
  particles.geometry.attributes.position.needsUpdate = true;
  particles.geometry.attributes.size.needsUpdate = true;
  particles.geometry.attributes.color.needsUpdate = true;

  // Frequency tail rings — pulse and rotate with speech
  tailRings.forEach((ring, idx) => {
    const freq = 0.4 + idx * 0.25;
    const pulse = Math.sin(particleTime * freq) * currentParticleEnergy;
    ring.material.opacity = ring.userData.baseOpacity + pulse * 0.25;
    ring.rotation.z += dt * (0.15 + currentParticleEnergy * 0.5) * (idx + 1) * 0.3;
    // Scale ring slightly with energy
    const s = 1 + pulse * 0.08;
    ring.scale.setScalar(s);
    // Color shift with energy
    const hue = 0.12 + currentParticleEnergy * 0.06;
    ring.material.color.setHSL(hue, 0.9, 0.5 + pulse * 0.3);
  });

  // Rotate dial needle when "playing"
  if (isPlaying && !isPaused && radioGroup.userData.needle) {
    // Gentle oscillation instead of spinning — sweeps back and forth like tuning
    const sweep = Math.sin(particleTime * 0.7) * 0.25;
    radioGroup.userData.needle.rotation.z = sweep;
    if (radioGroup.userData.needleTip) radioGroup.userData.needleTip.rotation.z = sweep;
  }

  // Bobble + flick-to-spin
  let watchBobble = radioGroup.userData._bobble || 0;
  watchBobble += dt * 1.2;
  radioGroup.userData._bobble = watchBobble;
  radioGroup.position.y = Math.sin(watchBobble * 0.6) * 0.1;
  radioGroup.rotation.x += (Math.sin(watchBobble) * 0.08 - radioGroup.rotation.x) * 3 * dt;
  
  if (!radioGroup.userData._spinSpeed) radioGroup.userData._spinSpeed = 0;
  radioGroup.userData._spinSpeed *= 0.97;
  radioGroup.rotation.y += radioGroup.userData._spinSpeed + (targetRotY - radioGroup.rotation.y) * 3 * dt;
  radioGroup.rotation.x += (targetRotX - radioGroup.rotation.x) * 3 * dt;

  // Dial light intensity — warm pulse with speech
  dialLight.intensity = 1.8 + currentParticleEnergy * 1.6;
  dialLight.color.setHSL(0.12, 0.95, 0.5 + currentParticleEnergy * 0.2);

  renderer.render(scene, camera);
}
