<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CSM Aegis Radio — SiblingFrequency — V2 Portable</title>
<style>
:root {
  --brass: #c9a84c;
  --brass-dark: #8b6914;
  --wood: #3d2817;
  --wood-light: #5c3a1e;
  --dial: #1a0a00;
  --glow: #ffd700;
  --text: #f0e6c8;
  --particle-gold: #ffd700;
  --particle-copper: #e8a840;
  --particle-bronze: #cd7f32;
  --particle-silver: #c0c0c0;
  --particle-blue: #4488cc;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0502;
  font-family: 'Georgia', 'Times New Roman', serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

#canvas3d {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}

#ui-layer {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 10;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding: 20px;
}

#display-area {
  pointer-events: auto;
  width: 100%;
  max-width: 700px;
  min-height: 320px;
  background: rgba(10,5,2,0.85);
  border: 3px solid var(--brass);
  border-radius: 18px;
  padding: 18px 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 40px rgba(201,168,76,0.15), inset 0 0 80px rgba(0,0,0,0.6);
  position: relative;
}

.title-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--brass);
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(201,168,76,0.3);
  padding-bottom: 8px;
}

.episode-selector {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}

select {
  background: var(--dial);
  color: var(--text);
  border: 2px solid var(--brass-dark);
  border-radius: 12px;
  padding: 6px 10px;
  font-family: 'Georgia', serif;
  font-size: 12px;
  cursor: pointer;
  max-width: 200px;
  outline: none;
}

select:focus { border-color: var(--glow); box-shadow: 0 0 10px rgba(255,215,0,0.3); }

.controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

button {
  background: linear-gradient(180deg, #5c3a1e 0%, #3d1a08 100%);
  color: var(--brass);
  border: 2px solid var(--brass-dark);
  border-radius: 20px;
  padding: 8px 16px;
  font-family: 'Georgia', serif;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
  pointer-events: auto;
  text-shadow: 0 1px 2px rgba(0,0,0,0.8);
}

button:hover {
  background: linear-gradient(180deg, #7a4a2a 0%, #5c2a10 100%);
  border-color: var(--glow);
  box-shadow: 0 0 15px rgba(255,215,0,0.2);
}

button.active {
  background: linear-gradient(180deg, #8b6914 0%, #c9a84c 100%);
  color: #1a0a00;
  border-color: var(--glow);
}

button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

#now-playing {
  color: var(--text);
  font-size: 14px;
  font-style: italic;
  min-height: 20px;
  text-align: center;
  opacity: 0.9;
}

#word-display {
  color: var(--brass);
  font-size: 28px;
  font-weight: bold;
  text-align: center;
  min-height: 40px;
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(255,215,0,0.3);
  transition: all 0.15s;
}

#stats {
  display: flex;
  justify-content: space-around;
  color: rgba(240,230,200,0.6);
  font-size: 10px;
  letter-spacing: 1px;
}

.menu-toggle {
  position: absolute;
  left: -16px;
  top: 50%;
  transform: translateY(-50%);
  width: 30px;
  height: 50px;
  background: var(--wood);
  border: 2px solid var(--brass-dark);
  border-radius: 0 10px 10px 0;
  color: var(--brass);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 11;
}

#display-area.menu-hidden .title-bar,
#display-area.menu-hidden .episode-selector,
#display-area.menu-hidden .controls,
#display-area.menu-hidden #stats {
  display: none;
}
#display-area.menu-hidden {
  min-height: auto;
  padding: 12px;
}
#display-area.menu-hidden #now-playing { margin: 0; }
#display-area.menu-hidden #word-display { font-size: 20px; }

@media (max-width: 600px) {
  #display-area { padding: 10px 14px; min-height: 260px; }
  #word-display { font-size: 20px; }
  button { padding: 6px 12px; font-size: 11px; }
  .title-bar { font-size: 10px; }
}
@media (orientation: landscape) and (max-height: 500px) {
  #display-area { min-height: 200px; flex-direction: row; flex-wrap: wrap; gap: 4px; }
  #word-display { font-size: 16px; width: 100%; }
}
</style>
</head>

<div id="canvas3d"></div>

<div id="ui-layer">
  <div id="display-area">
    <div class="menu-toggle" id="menuToggle" title="Hide/Show Menu">◀</div>
    <div class="title-bar">
      <span>⚡ AEGIS RADIO ⚡</span>
      <span id="clock">SiblingFrequency</span>

      <button id="btnNext" title="Next Segment">⏭</button>

      <button id="btnScreen" title="Keep Screen On">📱 AWAKE</button>

    </div>
  </div>
</div>

glassFront.position.z = 0.07;
watchGroup.add(glassFront);

// Glass back — slightly more opaque
const glassBackGeom = new THREE.CylinderGeometry(1.28, 1.28, 0.02, 64);
const glassBack = new THREE.Mesh(glassBackGeom, new THREE.MeshStandardMaterial({

glassBack.position.z = -0.07;
watchGroup.add(glassBack);

// ── WATCH FACE — CarrPod logo as concentric circles + vector mark ──
const faceGeom = new THREE.CircleGeometry(1.25, 64);
const faceMesh = new THREE.Mesh(faceGeom, new THREE.MeshStandardMaterial({ 
  color: 0x1a1008, roughness: 0.3, metalness: 0.05, transparent: true, opacity: 0.6, emissive: 0x0a0500, emissiveIntensity: 0.4
}));
faceMesh.position.z = 0.06;
watchGroup.add(faceMesh);

// Inner decorative ring
const innerRing = new THREE.Mesh(new THREE.TorusGeometry(1.1, 0.015, 16, 64), new THREE.MeshStandardMaterial({ color: 0xffa040, roughness: 0.2, emissive: 0xff4400, emissiveIntensity: 0.5 }));
innerRing.position.z = 0.07;
watchGroup.add(innerRing);

// CarrPod vector logo — three nested arcs representing protection circles
for (let a = 0; a < 3; a++) {
  const arcGeom = new THREE.TorusGeometry(0.35 + a * 0.28, 0.018, 8, 48, Math.PI * 1.5);
  const arc = new THREE.Mesh(arcGeom, new THREE.MeshStandardMaterial({ color: 0xffa040, roughness: 0.15, emissive: 0xff6600, emissiveIntensity: 0.9 }));
  arc.position.z = 0.08;
  watchGroup.add(arc);
}

// Center dot — CarrPod core
const centerDot = new THREE.Mesh(new THREE.SphereGeometry(0.06, 24, 24), new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.1, emissive: 0xff8800, emissiveIntensity: 1.5 }));
centerDot.position.z = 0.08;
watchGroup.add(centerDot);

// ── HOUR MARKERS — brass dots like a real pocket watch ──
for (let h = 0; h < 12; h++) {
  const angle = (h / 12) * Math.PI * 2 - Math.PI / 2;
  const dotGeom = new THREE.SphereGeometry(0.025, 8, 8);
  const dot = new THREE.Mesh(dotGeom, new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.2, emissive: 0xff8800, emissiveIntensity: 0.6 }));

const hourHand = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.5, 0.01), new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.2, emissive: 0x442200, emissiveIntensity: 0.3 }));

const chainGeom = new THREE.BufferGeometry().setFromPoints(chainPts);
const chain = new THREE.Line(chainGeom, new THREE.LineBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.7 }));
watchGroup.add(chain);

scene.add(watchGroup);

// ── CURIE CHROMATIC PARTICLES — radium-era radioactive glow colors ──
const curieColors = [
  [1.0, 0.55, 0.05],   // Radium orange

const particleCount = 500;
const particleGeom = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleColors = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);
const particleHome = new Float32Array(particleCount * 3);
const particlePhase = new Float32Array(particleCount);
const particleBaseColor = new Float32Array(particleCount * 3);
const particleGroup = new Float32Array(particleCount);

for (let i = 0; i < particleCount; i++) {
  const ringN = Math.floor(i / 100);
  const baseRadius = 1.7 + ringN * 0.5;
  const baseY = (Math.random() - 0.5) * 0.6 * (ringN + 1);

scene.add(particles);

// ── PARTICLE SYSTEM — Swimming school of light with frequency tails ──
const particleCount = 500;
const particleGeom = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleColors = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);
const particleHome = new Float32Array(particleCount * 3);
const particlePhase = new Float32Array(particleCount);
const particleGroup = new Float32Array(particleCount);

const particleColorsArr = [
  [1.0, 0.843, 0.05],    // warm gold
  [0.95, 0.72, 0.22],    // copper 
  [0.78, 0.55, 0.25],    // bronze
  [0.82, 0.78, 0.72],    // silver
  [0.30, 0.56, 0.82],    // soft blue
];

// Create particles in nested orbital rings (like electron clouds around the radio)
for (let i = 0; i < particleCount; i++) {
  const ringN = Math.floor(i / 100); // 5 rings of 100 particles each
  const baseRadius = 1.5 + ringN * 0.55;

particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

const particles = new THREE.Points(particleGeom, particleMat);
scene.add(particles);

  ring.position.y = 0.2;

  scene.add(ring);
  tailRings.push(ring);

async function loadEpisode(filename) {
  currentEpisodeContent = '';
  episodeSegments = [];
  
  // Load exclusively from GitHub raw — this HTML is designed to work anywhere
  const url = GITHUB_RAW + 'sf-episodes/' + filename;
  
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    if (text.length < 100) throw new Error('Content too short');
    currentEpisodeContent = text;
  } catch(e) {
    currentEpisodeContent = "Connecting to broadcast... Please wait. If this persists, check your internet connection.";
    episodeSegments = [currentEpisodeContent];
    document.getElementById('statPlaying').textContent = '⚠ Loading...';
    return;
  }
  
  // Split into segments on markdown headers or double newlines
  const parts = currentEpisodeContent.split(/\n\n(?=#)/).filter(s => s.trim().length > 40);
  if (parts.length >= 3) {
    episodeSegments = parts;
  } else {
    episodeSegments = currentEpisodeContent.split(/\n\n/).filter(s => s.trim().length > 50);
  }
  if (episodeSegments.length === 0) {
    episodeSegments = [currentEpisodeContent];
  }
  
  currentSegmentIndex = 0;
  
  // Extract title from content
  const epEntry = EPISODE_MANIFEST.find(e => e.file === filename);
  if (epEntry) {
    document.getElementById('now-playing').textContent = `📻 Ep ${epEntry.num}: ${epEntry.title}`;
  }
}

async function loadCommercials() {
  const batchDirs = ['BATCH-001', 'BATCH-002', 'BATCH-003', 'BATCH-004', 'BATCH-005', 'BATCH-006', 'BATCH-007', 'BATCH-008', 'BATCH-009'];
  const dir = batchDirs[Math.floor(Math.random() * batchDirs.length)];
  const baseUrl = GITHUB_RAW + 'CSMCommercials/' + dir + '/';
  
  try {
    const dirResp = await fetch(baseUrl);
    if (!dirResp.ok) return [];
    const dirText = await dirResp.text();
    const parser = new DOMParser();
    const dirDoc = parser.parseFromString(dirText, 'text/html');
    const links = [...dirDoc.querySelectorAll('a')].map(a => a.textContent);
    const batchFile = links.find(l => l.endsWith('.md')) || '';
    if (!batchFile) return [];
    
    const resp = await fetch(baseUrl + batchFile);
    if (!resp.ok) return [];
    const text = await resp.text();
    const spots = text.split(/^##\s+COMM-/m).filter(s => s.trim().length > 60);
    if (spots.length === 0) {
      const altSpots = text.split(/^---$/m).filter(s => s.trim().length > 60);
      return altSpots.map(s => s.trim());
    }
    return spots.map(s => 'COMM-' + s.trim());
  } catch(e) { return []; }
}

// Force voice loading
speechSynthesis.onvoiceschanged = () => {
  populateVoices();
  const voices = speechSynthesis.getVoices();
  const sel = document.getElementById('voiceSelect');
  if (!selectedVoice && voices.length > 0) {
    const googleVoice = voices.find(v => v.name.includes('Google') && v.lang.startsWith('en'));
    const enVoice = voices.find(v => v.lang.startsWith('en-US') || v.lang.startsWith('en-GB'));
    const pick = googleVoice || enVoice || voices[0];
    if (pick) {
      selectedVoice = pick;
      sel.value = voices.indexOf(pick);
    }
  }
};
// Also try loading immediately
setTimeout(() => {
  populateVoices();
  const voices = speechSynthesis.getVoices();
  if (voices.length > 0 && !selectedVoice) {
    const googleVoice = voices.find(v => v.name.includes('Google') && v.lang.startsWith('en'));
    const enVoice = voices.find(v => v.lang.startsWith('en-US') || v.lang.startsWith('en-GB'));

  }

  const idx = parseInt(e.target.value);

  } else {
    selectedVoice = null;
  }

function speak(text, onEnd, onWord) {
  return new Promise((resolve) => {
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    if (selectedVoice) utterance.voice = selectedVoice;
    utterance.rate = 0.92;
    utterance.pitch = 1.02;
    utterance.volume = 0.9;
    currentUtterance = utterance;

    // Track words for particle animation
    let wordIndex = 0;
    const words = text.split(/\s+/);
    
    utterance.onboundary = (event) => {
      if (event.charIndex !== undefined && words.length > 0) {
        wordIndex = Math.min(Math.floor(event.charIndex / 5), words.length - 1);
        const word = words[wordIndex] || '';
        spokenWords = word;
        document.getElementById('word-display').textContent = word;
        targetParticleEnergy = 0.6 + Math.random() * 0.9;
        if (onWord) onWord(word);
      }
    };

    utterance.onend = () => {
      currentUtterance = null;
      document.getElementById('word-display').textContent = '';
      targetParticleEnergy = 0.3;
      resolve();
      if (onEnd) onEnd();
    };

    utterance.onerror = (e) => {
      if (e.error !== 'interrupted' && e.error !== 'canceled') {
        console.error('Speech error:', e);
      }
      currentUtterance = null;
      targetParticleEnergy = 0.3;
      resolve();
    };

    speechSynthesis.speak(utterance);
  });
}

// ──────────────────────────────────────
// COMMERCIAL MANAGEMENT
// ──────────────────────────────────────
async function getNextCommercial() {
  if (currentCommercialPool.length === 0) {
    currentCommercialPool = await loadCommercials();
    if (currentCommercialPool.length === 0) return "Aegis Certified products available now on the Carr-Forge. The shield is not a product. The shield is the philosophy.";
    // Shuffle
    for (let i = currentCommercialPool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [currentCommercialPool[i], currentCommercialPool[j]] = [currentCommercialPool[j], currentCommercialPool[i]];
    }
  }
  // Get a commercial, try to find one not voiced by a conflicting agent
  const next = currentCommercialPool.shift();
  // Parse out just the commercial text (strip COMM- prefix and agent suffix)
  let adText = next.replace(/^COMM-[A-Za-z0-9]+-/, '').replace(/-[A-Z]+$/, '').trim();
  if (adText.length < 40) adText = "Preparedness products from Carrington Storm Motors. Open source. Open spec. Carr-Forge available now.";
  return `🎙 COMMERCIAL: ${adText}`;
}

// ──────────────────────────────────────
// PLAYBACK ENGINE
// ──────────────────────────────────────
let playQueue = [];
let queueIndex = 0;

async function buildPlayQueue() {
  playQueue = [];
  for (let i = 0; i < episodeSegments.length; i++) {
    playQueue.push({ type: 'segment', text: episodeSegments[i], index: i });
    if (i < episodeSegments.length - 1) {
      const adText = await getNextCommercial();
      playQueue.push({ type: 'commercial', text: adText });
    }
  }
  queueIndex = 0;
}

async function processQueue() {
  if (!isPlaying || queueIndex >= playQueue.length) {
    // Episode finished, loop to next
    if (isPlaying) {
      const sel = document.getElementById('episodeSelect');
      const idx = sel.selectedIndex;
      if (idx < sel.options.length - 1) {
        sel.selectedIndex = idx + 1;
        await startEpisode(sel.value);
      } else {
        sel.selectedIndex = 1; // wrap to first episode
        if (sel.options[1]) await startEpisode(sel.options[1].value);
      }
    }
    return;
  }

  const item = playQueue[queueIndex];
  document.getElementById('statPlaying').textContent = item.type === 'commercial' ? '📢 Commercial' : `📻 Segment ${item.index + 1}/${episodeSegments.length}`;
  
  // Add a small indicator for commercial vs episode
  const prefix = item.type === 'commercial' ? '🔶 ' : '';

  await speak(prefix + item.text, null, (word) => {
    // Word callback updates particles via targetParticleEnergy
    if (word) targetParticleEnergy = 0.5 + (word.length / 8) * 1.2;
  });

  queueIndex++;
  if (isPlaying) {
    // Small pause between segments
    await new Promise(r => setTimeout(r, 800));
    processQueue();
  }
}

async function startEpisode(filename) {
  speechSynthesis.cancel();
  isPlaying = true;
  isPaused = false;
  document.getElementById('btnPlay').textContent = '⏸ PAUSE';
  document.getElementById('btnPlay').classList.add('active');
  
  await loadEpisode(filename);
  currentCommercialPool = [];
  await buildPlayQueue();
  queueIndex = 0;
  
  document.getElementById('statPlaying').textContent = '▶ Playing';
  processQueue();
}

function stopPlayback() {
  isPlaying = false;
  isPaused = false;
  speechSynthesis.cancel();
  currentUtterance = null;
  document.getElementById('btnPlay').textContent = '▶ PLAY';
  document.getElementById('btnPlay').classList.remove('active');
  document.getElementById('statPlaying').textContent = '⏹ Stopped';
  document.getElementById('word-display').textContent = '';
  document.getElementById('now-playing').textContent = 'Tune in...';
  targetParticleEnergy = 0.3;
}

function skipForward() {
  if (!isPlaying || playQueue.length === 0) return;
  if (skipLocked) return;
  skipLocked = true;
  speechSynthesis.cancel();
  currentUtterance = null;
  let next = queueIndex + 1;
  while (next < playQueue.length && playQueue[next].type === 'commercial') next++;
  if (next >= playQueue.length) { skipLocked = false; stopPlayback(); return; }
  queueIndex = next;
  document.getElementById('statPlaying').textContent = `📻 Segment ${playQueue[next].index + 1}/${episodeSegments.length}`;
  targetParticleEnergy = 0.4;
  setTimeout(() => { skipLocked = false; processQueue(); }, 300);
}

function skipBackward() {
  if (!isPlaying || playQueue.length === 0) return;
  if (skipLocked) return;
  skipLocked = true;
  speechSynthesis.cancel();
  currentUtterance = null;
  let prev = queueIndex - 1;
  while (prev >= 0 && playQueue[prev].type === 'commercial') prev--;
  if (prev < 0) prev = 0;
  queueIndex = prev;
  document.getElementById('statPlaying').textContent = `📻 Segment ${playQueue[prev].index + 1}/${episodeSegments.length}`;
  targetParticleEnergy = 0.4;
  setTimeout(() => { skipLocked = false; processQueue(); }, 300);
}

function togglePause() {
  if (!isPlaying) return;
  if (isPaused) {
    speechSynthesis.resume();
    isPaused = false;
    document.getElementById('btnPlay').textContent = '⏸ PAUSE';
    document.getElementById('statPlaying').textContent = '▶ Playing';
    targetParticleEnergy = 0.6;
  } else {
    speechSynthesis.pause();
    isPaused = true;
    document.getElementById('btnPlay').textContent = '▶ RESUME';
    document.getElementById('statPlaying').textContent = '⏸ Paused';
    targetParticleEnergy = 0.2;
  }
}

async function toggleScreenLock() {
  screenLocked = !screenLocked;
  const btn = document.getElementById('btnScreen');
  if (screenLocked) {
    btn.classList.add('active');
    btn.textContent = '📱 AWAKE ON';
    // Use Wake Lock API if available
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => {
        screenLocked = false;
        btn.classList.remove('active');
        btn.textContent = '📱 AWAKE';
      });
    } catch(e) { /* not supported */ }
  } else {
    btn.classList.remove('active');
    btn.textContent = '📱 AWAKE';
    if (wakeLock) {
      wakeLock.release();
      wakeLock = null;
    }
  }
}

function toggleSleepLock() {
  sleepLocked = !sleepLocked;
  const btn = document.getElementById('btnSleep');
  if (sleepLocked) {
    btn.classList.add('active');
    btn.textContent = '💤 NOSLEEP ON';
    // Play silent audio to prevent sleep
    if (!window._sleepAudio) {
      window._sleepAudio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==");
      window._sleepAudio.loop = true;
    }
    window._sleepAudio.play().catch(() => {});
  } else {
    btn.classList.remove('active');
    btn.textContent = '💤 NOSLEEP';
    if (window._sleepAudio) {
      window._sleepAudio.pause();
    }
  }
}

// ──────────────────────────────────────
// DRAG-TO-ROTATE — touch the radio to spin it
// ──────────────────────────────────────
let isDragging = false, prevMouseX = 0, prevMouseY = 0;
let targetRotY = 0, targetRotX = 0;

renderer.domElement.addEventListener('pointerdown', (e) => {
  isDragging = true;
  prevMouseX = e.clientX;
  prevMouseY = e.clientY;
});
window.addEventListener('pointerup', () => { isDragging = false; });
window.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouseX;
  const dy = e.clientY - prevMouseY;
  targetRotY += dx * 0.008;
  targetRotX += dy * 0.005;
  targetRotX = Math.max(-0.4, Math.min(0.4, targetRotX));
  prevMouseX = e.clientX;
  prevMouseY = e.clientY;
});
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  particleTime += dt;

  // Smooth particle energy transition — much gentler
  currentParticleEnergy += (targetParticleEnergy - currentParticleEnergy) * 2.5 * dt;

  // Update particles — swimming with proximity color shift
  for (let i = 0; i < particleCount; i++) {
    const hx = particleHome[i*3], hy = particleHome[i*3+1], hz = particleHome[i*3+2];
    const phase = particlePhase[i], group = particleGroup[i];

    const homeRadius = Math.sqrt(hx*hx + hz*hz);
    const homeAngle = Math.atan2(hz, hx);
    const orbitAngle = homeAngle + particleTime * (0.18 + currentParticleEnergy * 0.5) * (1 + group * 0.08);
    
    const tx = Math.cos(orbitAngle) * homeRadius;
    const ty = hy + Math.sin(particleTime * 0.5 + phase) * 0.1;
    const tz = Math.sin(orbitAngle) * homeRadius * 0.55;

    const dx = tx - particlePositions[i*3];
    const dy = ty - particlePositions[i*3+1];
    const dz = tz - particlePositions[i*3+2];
    
    particlePositions[i*3] += dx * 0.7 * dt;
    particlePositions[i*3+1] += dy * 0.7 * dt;
    particlePositions[i*3+2] += dz * 0.7 * dt;

    const wx = Math.sin(particleTime * 1.1 + phase * 3.5) * (0.12 + currentParticleEnergy * 0.25);
    const wz = Math.cos(particleTime * 0.9 + phase * 2.2) * (0.12 + currentParticleEnergy * 0.25);
    particlePositions[i*3] += wx * dt;
    particlePositions[i*3+2] += wz * dt;

    // Proximity color shift — particles near each other glow warmer
    let proximityBoost = 0;
    for (let j = Math.max(0, i - 30); j < Math.min(particleCount, i + 30); j++) {
      if (i === j) continue;
      const pdx = particlePositions[i*3] - particlePositions[j*3];
      const pdy = particlePositions[i*3+1] - particlePositions[j*3+1];
      const pdz = particlePositions[i*3+2] - particlePositions[j*3+2];
      const dist = Math.sqrt(pdx*pdx + pdy*pdy + pdz*pdz);
      if (dist < 0.3) proximityBoost += (0.3 - dist) * 1.5;
    }
    proximityBoost = Math.min(proximityBoost, 0.5);

    const bcR = particleBaseColor[i*3], bcG = particleBaseColor[i*3+1], bcB = particleBaseColor[i*3+2];
    particleColors[i*3] = bcR * (0.65 + currentParticleEnergy * 0.3 + proximityBoost);
    particleColors[i*3+1] = bcG * (0.6 + currentParticleEnergy * 0.25 + proximityBoost * 0.5);
    particleColors[i*3+2] = bcB * (0.55 + currentParticleEnergy * 0.2 + proximityBoost * 0.3);
    particleSizes[i] = (0.015 + group * 0.005) + currentParticleEnergy * 0.04 + proximityBoost * 0.06;
  }
  particles.geometry.attributes.position.needsUpdate = true;
  particles.geometry.attributes.size.needsUpdate = true;
  particles.geometry.attributes.color.needsUpdate = true;

  // Frequency tail rings — pulse and rotate
  tailRings.forEach((ring, idx) => {
    ring.material.opacity = ring.userData.baseOpacity + currentParticleEnergy * 0.2;
    ring.rotation.z += dt * (0.1 + currentParticleEnergy * 0.3) * (idx + 1) * 0.25;
    ring.material.color.setHSL(0.11, 0.9, 0.4 + currentParticleEnergy * 0.3);
  });

  // Watch hands rotate slowly during playback
  if (isPlaying && !isPaused) {
    if (watchGroup.userData.hourHand) watchGroup.userData.hourHand.rotation.z += dt * 0.3;
    if (watchGroup.userData.minuteHand) watchGroup.userData.minuteHand.rotation.z += dt * 1.8;
  }

  // Bobble animation — gentle angle wobble
  watchBobble += dt * 1.2;
  const bobbleAngle = Math.sin(watchBobble) * 0.08;
  
  // Flick spin on Y axis with friction decay
  watchSpinSpeed *= 0.97;
  watchGroup.rotation.y += watchSpinSpeed + (targetRotY - watchGroup.rotation.y) * 3 * dt;
  watchGroup.rotation.x += ((targetRotX + bobbleAngle) - watchGroup.rotation.x) * 3 * dt;
  watchGroup.position.y = Math.sin(watchBobble * 0.6) * 0.1;

  // Dial light becomes watch face glow — amber warmth
  dialLight.intensity = 1.4 + currentParticleEnergy * 1.2;
  dialLight.color.setHSL(0.11, 1.0, 0.45 + currentParticleEnergy * 0.2);

  renderer.render(scene, camera);
}

// ──────────────────────────────────────
function resize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  
  // Adjust camera for portrait vs landscape
  if (window.innerWidth < window.innerHeight) {
    camera.position.set(0, 1.4, 6.5);
    camera.lookAt(0, 0.3, 0);
  } else {
    camera.position.set(0, 1.8, 5.5);
    camera.lookAt(0, 0.4, 0);
  }
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));
