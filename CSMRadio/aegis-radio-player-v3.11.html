<!DOCTYPE html>
<html lang="en">
<head>

<title>CSM Aegis Radio — SiblingFrequency — V2 Portable</title>
<style>
:root {
  --brass: #c9a84c;
  --brass-dark: #8b6914;
  --wood: #3d2817;
  --wood-light: #5c3a1e;
  --dial: #1a0a00;
  --glow: #ffd700;
  --text: #f0e6c8;
  --particle-gold: #ffd700;
  --particle-copper: #e8a840;
  --particle-bronze: #cd7f32;
  --particle-silver: #c0c0c0;
  --particle-blue: #4488cc;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0502;
  font-family: 'Georgia', 'Times New Roman', serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;

}

#canvas3d {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}

#ui-layer {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 10;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding: 20px;
}

#display-area {
  pointer-events: auto;
  width: 100%;
  max-width: 700px;
  min-height: 320px;
  background: rgba(10,5,2,0.85);
  border: 3px solid var(--brass);
  border-radius: 18px;
  padding: 18px 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 40px rgba(201,168,76,0.15), inset 0 0 80px rgba(0,0,0,0.6);
  position: relative;
}

.title-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--brass);
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(201,168,76,0.3);
  padding-bottom: 8px;
}

.episode-selector {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}

select {
  background: var(--dial);
  color: var(--text);
  border: 2px solid var(--brass-dark);
  border-radius: 12px;
  padding: 6px 10px;
  font-family: 'Georgia', serif;
  font-size: 12px;

  max-width: 200px;
  outline: none;
}

select:focus { border-color: var(--glow); box-shadow: 0 0 10px rgba(255,215,0,0.3); }

.controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

button {
  background: linear-gradient(180deg, #5c3a1e 0%, #3d1a08 100%);
  color: var(--brass);
  border: 2px solid var(--brass-dark);
  border-radius: 20px;
  padding: 8px 16px;
  font-family: 'Georgia', serif;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
  pointer-events: auto;
  text-shadow: 0 1px 2px rgba(0,0,0,0.8);
}

button:hover {
  background: linear-gradient(180deg, #7a4a2a 0%, #5c2a10 100%);
  border-color: var(--glow);
  box-shadow: 0 0 15px rgba(255,215,0,0.2);
}

button.active {
  background: linear-gradient(180deg, #8b6914 0%, #c9a84c 100%);
  color: #1a0a00;
  border-color: var(--glow);
}

button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

#now-playing {
  color: var(--text);
  font-size: 14px;
  font-style: italic;
  min-height: 20px;
  text-align: center;
  opacity: 0.9;

#word-display {

  text-align: center;
  letter-spacing: 1px;
  line-height: 1.4;

  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 6px;
}
.word-active {
  color: var(--glow);
  font-size: 30px;
  font-weight: bold;
  text-shadow: 0 0 18px rgba(255,215,0,0.5);
}
.word-next {
  color: rgba(240,230,200,0.5);
  font-size: 20px;
}
.word-prev {
  color: rgba(240,230,200,0.3);
  font-size: 16px;
}

#stats {
  display: flex;
  justify-content: space-around;
  color: rgba(240,230,200,0.6);
  font-size: 10px;
  letter-spacing: 1px;
}

.menu-toggle {
  position: absolute;
  left: -16px;
  top: 50%;
  transform: translateY(-50%);
  width: 30px;
  height: 50px;
  background: var(--wood);
  border: 2px solid var(--brass-dark);
  border-radius: 0 10px 10px 0;
  color: var(--brass);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;

}

#display-area.menu-hidden .title-bar,
#display-area.menu-hidden .episode-selector,
#display-area.menu-hidden .controls,

}
#display-area.menu-hidden {

}
#display-area.menu-hidden #now-playing { margin: 0; }
#display-area.menu-hidden #word-display { font-size: 20px; }

@media (max-width: 600px) {

scene.add(ambientLight);

dialLight.position.set(0, 0.6, 2.2);
scene.add(dialLight);

scene.add(topLight);

// ── Build the 1920s Radio ──
const radioGroup = new THREE.Group();
const brassMat = new THREE.MeshStandardMaterial({ color: 0xc9a84c, roughness: 0.3, metalness: 0.92 });
const shieldGlass = new THREE.MeshStandardMaterial({ color: 0x2a1508, roughness: 0.15, metalness: 0.0, transparent: true, opacity: 0.35 });
const dialMat = new THREE.MeshStandardMaterial({ color: 0x1a0a00, roughness: 0.5, metalness: 0.1 });

const bodyMesh = new THREE.Mesh(bodyGeom, shieldGlass);
bodyMesh.position.y = 0.2;
radioGroup.add(bodyMesh);

// Arched top — translucent

const archMesh = new THREE.Mesh(archGeom, shieldGlass);
archMesh.rotation.z = Math.PI / 2;

radioGroup.add(archMesh);

// Wireframe overlay — golden glow skeleton

archWire.rotation.z = Math.PI / 2;
archWire.position.set(0, 1.1, 0);
radioGroup.add(archWire);

const bodyWire = new THREE.LineSegments(
  new THREE.EdgesGeometry(new THREE.BoxGeometry(2.64, 1.84, 1.44, 4, 4, 3)),
  new THREE.LineBasicMaterial({ color: 0xffd700, linewidth: 1, transparent: true, opacity: 0.55 })
);
bodyWire.position.y = 0.2;
radioGroup.add(bodyWire);

// ── AEGIS SHIELD EMBLEM — three nested arcs, center on front panel ──
for (let a = 0; a < 3; a++) {
  const arcGeom = new THREE.TorusGeometry(0.3 + a * 0.2, 0.018, 8, 48, Math.PI * 1.6);
  const arc = new THREE.Mesh(arcGeom, shieldEmblem);
  arc.position.set(-0.5, 0.55, 0.73);
  radioGroup.add(arc);
}
const centerDot = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), shieldEmblem);
centerDot.position.set(-0.5, 0.55, 0.73);
radioGroup.add(centerDot);

// Speaker grille — open concentric rings, particles pass through
for (let i = 0; i < 5; i++) {
  const ringGeom = new THREE.TorusGeometry(0.55 - i * 0.09, 0.012, 16, 48);
  const ring = new THREE.Mesh(ringGeom, brassMat);
  ring.position.set(0.55, 0.2, 0.71);
  ring.rotation.x = Math.PI / 2;
  radioGroup.add(ring);
}
// Speaker cloth — see-through mesh instead of solid
const clothGeom = new THREE.CircleGeometry(0.55, 32);
const clothMesh = new THREE.Mesh(clothGeom, new THREE.MeshStandardMaterial({ color: 0x8b7355, roughness: 0.9, transparent: true, opacity: 0.3 }));
clothMesh.position.set(0.55, 0.2, 0.72);
radioGroup.add(clothMesh);

// Dial
const dialGeom = new THREE.CylinderGeometry(0.32, 0.32, 0.06, 48);
const dialMesh = new THREE.Mesh(dialGeom, dialMat);
dialMesh.position.set(-0.5, 0.35, 0.75);
dialMesh.rotation.x = Math.PI / 2;
radioGroup.add(dialMesh);

const dialRingGeom = new THREE.TorusGeometry(0.34, 0.02, 16, 48);
const dialRing = new THREE.Mesh(dialRingGeom, brassMat);
dialRing.position.set(-0.5, 0.35, 0.78);
radioGroup.add(dialRing);

// Dial needle
const needleGeom = new THREE.CylinderGeometry(0.006, 0.006, 0.28, 8);
const needle = new THREE.Mesh(needleGeom, wireMat);
needle.position.set(-0.5, 0.35, 0.79);
radioGroup.add(needle);
radioGroup.userData.needle = needle;

// Knobs
for (let i = 0; i < 3; i++) {

// Frequency display
const freqBgGeom = new THREE.PlaneGeometry(0.7, 0.18);
const freqBg = new THREE.Mesh(freqBgGeom, glassMat);
freqBg.position.set(-0.5, 0.65, 0.72);

// Antenna wires

  radioGroup.add(antWire);
}

// Feet
for (let i = 0; i < 4; i++) {
  const footGeom = new THREE.CylinderGeometry(0.08, 0.1, 0.15, 16);
  const foot = new THREE.Mesh(footGeom, brassMat);
  foot.position.set((i < 2 ? -0.8 : 0.8), -0.82, (i % 2 === 0 ? -0.4 : 0.4));
  radioGroup.add(foot);
}

scene.add(radioGroup);

// ── PARTICLE SYSTEM ──
const particleCount = 600;
const particleGeom = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleColors = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);
const particleBasePositions = new Float32Array(particleCount * 3);
const particleVelocities = new Float32Array(particleCount * 3);

const particleColorsArr = [
  [1.0, 0.50, 0.05],   // Radium orange
  [1.0, 0.22, 0.05],   // Radium red
  [0.15, 0.85, 0.25],  // Uranium green
  [1.0, 0.75, 0.10],   // Amber glow
  [0.10, 0.70, 0.90],  // Cherenkov blue
];

for (let i = 0; i < particleCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.random() * Math.PI;
  const r = 1.6 + Math.random() * 2.8;
  const x = Math.sin(phi) * Math.cos(theta) * r;
  const y = Math.sin(phi) * Math.sin(theta) * r * 0.6 + 0.3;
  const z = Math.cos(phi) * r * 0.7;

  particleBasePositions[i*3] = x;
  particleBasePositions[i*3+1] = y;
  particleBasePositions[i*3+2] = z;
  particlePositions[i*3] = x;
  particlePositions[i*3+1] = y;
  particlePositions[i*3+2] = z;

  const colorChoice = particleColorsArr[Math.floor(Math.random() * particleColorsArr.length)];
  particleColors[i*3] = colorChoice[0];
  particleColors[i*3+1] = colorChoice[1];
  particleColors[i*3+2] = colorChoice[2];

  particleSizes[i] = 0.015 + Math.random() * 0.06;
  particleVelocities[i*3] = (Math.random()-0.5) * 0.04;
  particleVelocities[i*3+1] = (Math.random()-0.5) * 0.04;
  particleVelocities[i*3+2] = (Math.random()-0.5) * 0.04;
}

particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeom.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
particleGeom.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

const particleMat = new THREE.PointsMaterial({
  size: 0.04,
  vertexColors: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true,
  opacity: 0.8,
});
const particles = new THREE.Points(particleGeom, particleMat);
scene.add(particles);

// GitHub raw URL — the HTML player loads all content exclusively from here

const GITHUB_RAW = 'https://raw.githubusercontent.com/ZirconiaAegisC/CarrPod/main/CSMRadio/';

async function loadEpisode(filename) {
  currentEpisodeContent = '';
  episodeSegments = [];
  
  // Load exclusively from GitHub raw — this HTML is designed to work anywhere
  const url = GITHUB_RAW + 'sf-episodes/' + filename;
  
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    if (text.length < 100) throw new Error('Content too short');
    currentEpisodeContent = text;
  } catch(e) {
    currentEpisodeContent = "Connecting to broadcast... Please wait. If this persists, check your internet connection.";
    episodeSegments = [currentEpisodeContent];
    document.getElementById('statPlaying').textContent = '⚠ Loading...';
    return;
  }
  
  // Split into segments on markdown headers or double newlines
  const parts = currentEpisodeContent.split(/\n\n(?=#)/).filter(s => s.trim().length > 40);
  if (parts.length >= 3) {
    episodeSegments = parts;
  } else {
    episodeSegments = currentEpisodeContent.split(/\n\n/).filter(s => s.trim().length > 50);
  }
  if (episodeSegments.length === 0) {
    episodeSegments = [currentEpisodeContent];
  }
  
  currentSegmentIndex = 0;
  
  // Extract title from content
  const epEntry = EPISODE_MANIFEST.find(e => e.file === filename);
  if (epEntry) {
    document.getElementById('now-playing').textContent = `📻 Ep ${epEntry.num}: ${epEntry.title}`;
  }
}

async function loadCommercials() {
  const batchDirs = ['BATCH-001', 'BATCH-002', 'BATCH-003', 'BATCH-004', 'BATCH-005', 'BATCH-006', 'BATCH-007', 'BATCH-008', 'BATCH-009'];
  const dir = batchDirs[Math.floor(Math.random() * batchDirs.length)];
  const baseUrl = GITHUB_RAW + 'CSMCommercials/' + dir + '/';
  
  try {
    const dirResp = await fetch(baseUrl);
    if (!dirResp.ok) return [];
    const dirText = await dirResp.text();
    const parser = new DOMParser();
    const dirDoc = parser.parseFromString(dirText, 'text/html');
    const links = [...dirDoc.querySelectorAll('a')].map(a => a.textContent);
    const batchFile = links.find(l => l.endsWith('.md')) || '';
    if (!batchFile) return [];
    
    const resp = await fetch(baseUrl + batchFile);
    if (!resp.ok) return [];
    const text = await resp.text();
    const spots = text.split(/^##\s+COMM-/m).filter(s => s.trim().length > 60);
    if (spots.length === 0) {
      const altSpots = text.split(/^---$/m).filter(s => s.trim().length > 60);
      return altSpots.map(s => s.trim());
    }
    return spots.map(s => 'COMM-' + s.trim());
  } catch(e) { return []; }
}

  sel.innerHTML = '<option value="">🎙 — Select Episode —</option>';
  EPISODE_MANIFEST.forEach(ep => {
    const opt = document.createElement('option');
    opt.value = ep.file;
    const titleShort = ep.title.length > 55 ? ep.title.substring(0, 52) + '...' : ep.title;
    opt.textContent = `Ep ${ep.num} — ${titleShort}`;
    sel.appendChild(opt);
  });
}

function updateStats() {
  const epEl = document.getElementById('statEpisodes');
  const adEl = document.getElementById('statCommercials');
  if (epEl) epEl.textContent = `Episodes: ${EPISODE_MANIFEST.length}`;
  if (adEl) adEl.textContent = `Ads: 196 commercials (9 batches)`;
}

// Fire immediately — document is ready at this point
populateEpisodeSelect();
updateStats();

// Stats are already initialized above
setTimeout(() => {
  document.getElementById('statPlaying').textContent = 'Ready — Select Episode';
}, 500);

// ──────────────────────────────────────
// SPEECH SYNTHESIS — Edge: Zira default | Chrome: Google voice default
// ──────────────────────────────────────
const isEdge = /Edg/i.test(navigator.userAgent);

function autoPickVoice() {
  const voices = speechSynthesis.getVoices();
  if (voices.length === 0 || selectedVoice) return;
  
  let pick = null;
  if (isEdge) {
    // Edge: search for Zira first, then any Microsoft English voice
    pick = voices.find(v => v.name.includes('Zira')) ||
           voices.find(v => v.name.includes('Microsoft') && v.lang.startsWith('en')) ||
           voices.find(v => v.lang.startsWith('en-US')) ||
           voices[0];
  } else {
    // Chrome/other: Google voice, then any English
    pick = voices.find(v => v.name.includes('Google') && v.lang.startsWith('en')) ||
           voices.find(v => v.lang.startsWith('en-US') || v.lang.startsWith('en-GB')) ||
           voices[0];
  }
  
  if (pick) {
    selectedVoice = pick;
    const sel = document.getElementById('voiceSelect');
    sel.value = voices.indexOf(pick);
  }
}

function populateVoices() {
  const voices = speechSynthesis.getVoices();
  if (voices.length === 0) return;
  const sel = document.getElementById('voiceSelect');
  const currentVal = sel.value;
  sel.innerHTML = '<option value="-1">🎤 Default</option>';
  voices.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name} (${v.lang || ''})`;
    sel.appendChild(opt);
  });
  if (currentVal && sel.options.length > parseInt(currentVal) + 1) sel.value = currentVal;
  autoPickVoice();
}

speechSynthesis.onvoiceschanged = () => { populateVoices(); autoPickVoice(); };
setTimeout(() => { populateVoices(); autoPickVoice(); }, 400);
setTimeout(() => { populateVoices(); autoPickVoice(); }, 1200);

document.getElementById('voiceSelect').addEventListener('change', (e) => {
  const idx = parseInt(e.target.value);
  const voices = speechSynthesis.getVoices();
  if (idx >= 0 && voices[idx]) {
    selectedVoice = voices[idx];
  } else {
    selectedVoice = null;
  }
});

function speak(text, onEnd, onWord) {
  return new Promise((resolve) => {
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    if (selectedVoice) utterance.voice = selectedVoice;
    utterance.rate = 0.92;
    utterance.pitch = 1.02;
    utterance.volume = 0.9;
    currentUtterance = utterance;

    // Track words for particle animation
    let wordIndex = 0;
    const words = text.split(/\s+/);
    
    utterance.onboundary = (event) => {
      if (event.charIndex !== undefined && words.length > 0) {
        wordIndex = Math.min(Math.floor(event.charIndex / 5), words.length - 1);
        const word = words[wordIndex] || '';
        spokenWords = word;
        
        // Build quasi-sentence window: 1 prev + current + 2 next
        const prev1 = wordIndex > 0 ? words[wordIndex - 1] : '';
        const next1 = wordIndex < words.length - 1 ? words[wordIndex + 1] : '';
        const next2 = wordIndex < words.length - 2 ? words[wordIndex + 2] : '';
        
        const disp = document.getElementById('word-display');
        disp.innerHTML = 
          (prev1 ? `<span class="word-prev">${prev1}</span>` : '') +
          `<span class="word-active">${word}</span>` +
          (next1 ? `<span class="word-next">${next1}</span>` : '') +
          (next2 ? `<span class="word-next">${next2}</span>` : '');
        
        targetParticleEnergy = 0.6 + Math.random() * 0.9;
        if (onWord) onWord(word);
      }
    };

    utterance.onend = () => {
      currentUtterance = null;
      document.getElementById('word-display').innerHTML = '';
      targetParticleEnergy = 0.3;
      resolve();
      if (onEnd) onEnd();
    };

    utterance.onerror = (e) => {
      if (e.error !== 'interrupted' && e.error !== 'canceled') {
        console.error('Speech error:', e);
      }
      currentUtterance = null;
      targetParticleEnergy = 0.3;
      resolve();
    };

    speechSynthesis.speak(utterance);
  });
}

// ──────────────────────────────────────
// COMMERCIAL MANAGEMENT
// ──────────────────────────────────────
async function getNextCommercial() {
  if (currentCommercialPool.length === 0) {
    currentCommercialPool = await loadCommercials();
    if (currentCommercialPool.length === 0) return "Aegis Certified products available now on the Carr-Forge. The shield is not a product. The shield is the philosophy.";
    // Shuffle
    for (let i = currentCommercialPool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [currentCommercialPool[i], currentCommercialPool[j]] = [currentCommercialPool[j], currentCommercialPool[i]];
    }
  }
  // Get a commercial, try to find one not voiced by a conflicting agent
  const next = currentCommercialPool.shift();
  // Parse out just the commercial text (strip COMM- prefix and agent suffix)
  let adText = next.replace(/^COMM-[A-Za-z0-9]+-/, '').replace(/-[A-Z]+$/, '').trim();
  if (adText.length < 40) adText = "Preparedness products from Carrington Storm Motors. Open source. Open spec. Carr-Forge available now.";
  return `🎙 COMMERCIAL: ${adText}`;
}

// ──────────────────────────────────────
// PLAYBACK ENGINE
// ──────────────────────────────────────
let playQueue = [];
let queueIndex = 0;

async function buildPlayQueue() {
  playQueue = [];
  for (let i = 0; i < episodeSegments.length; i++) {
    playQueue.push({ type: 'segment', text: episodeSegments[i], index: i });
    if (i < episodeSegments.length - 1) {
      const adText = await getNextCommercial();
      playQueue.push({ type: 'commercial', text: adText });
    }
  }
  queueIndex = 0;
}

async function processQueue() {
  if (!isPlaying || queueIndex >= playQueue.length) {
    // Episode finished, loop to next
    if (isPlaying) {
      const sel = document.getElementById('episodeSelect');
      const idx = sel.selectedIndex;
      if (idx < sel.options.length - 1) {
        sel.selectedIndex = idx + 1;
        await startEpisode(sel.value);
      } else {
        sel.selectedIndex = 1; // wrap to first episode
        if (sel.options[1]) await startEpisode(sel.options[1].value);
      }
    }
    return;
  }

  const item = playQueue[queueIndex];
    document.getElementById('statPlaying').textContent = item.type === 'commercial' ? '📢 Commercial' : `📻 Segment ${item.index + 1}/${episodeSegments.length}`;
    document.getElementById('segDisplay').textContent = item.type === 'segment' ? `Seg ${item.index + 1}/${episodeSegments.length}` : '📢';
    document.getElementById('segPlay').textContent = item.type === 'segment' ? `${item.index + 1}/${episodeSegments.length}` : '📢';
  
  // Add a small indicator for commercial vs episode
  const prefix = item.type === 'commercial' ? '🔶 ' : '';

  await speak(prefix + item.text, null, (word) => {
    // Word callback updates particles via targetParticleEnergy
    if (word) targetParticleEnergy = 0.5 + (word.length / 8) * 1.2;
  });

  queueIndex++;
  if (isPlaying) {
    // Small pause between segments
    await new Promise(r => setTimeout(r, 800));
    processQueue();
  }
}

async function startEpisode(filename) {
  speechSynthesis.cancel();
  isPlaying = true;
  document.getElementById('btnPlay').textContent = '■ STOP';
  
  await loadEpisode(filename);
  currentCommercialPool = [];
  await buildPlayQueue();
  queueIndex = 0;
  
  document.getElementById('statPlaying').textContent = '▶ Playing';
  processQueue();
}

function stopPlayback() {
  isPlaying = false;
  isPaused = false;
  speechSynthesis.cancel();
  currentUtterance = null;
  document.getElementById('btnPlay').textContent = '▶ PLAY';
  document.getElementById('btnPlay').classList.remove('active');
  document.getElementById('statPlaying').textContent = '⏹ Stopped';
  document.getElementById('word-display').innerHTML = '';
  document.getElementById('segDisplay').textContent = '';
  document.getElementById('segPlay').textContent = '—';
  document.getElementById('now-playing').textContent = 'Tune in...';
  targetParticleEnergy = 0.3;
}

function togglePlayStop() {
  if (isPlaying) {
    stopPlayback();
  } else {
    const sel = document.getElementById('episodeSelect');
    if (sel.value) {
      startEpisode(sel.value);
    } else if (sel.options.length > 1) {
      sel.selectedIndex = 1;
      startEpisode(sel.value);
    }
  }
}

function skipForward() {
  if (playQueue.length === 0) return;
  let next = queueIndex + 1;
  while (next < playQueue.length && playQueue[next].type === 'commercial') next++;
  if (next >= playQueue.length) return;
  if (isPlaying) speechSynthesis.cancel();
  queueIndex = next;
  updateSegmentDisplay();
}

function skipBackward() {
  if (playQueue.length === 0) return;
  let prev = queueIndex - 1;
  while (prev >= 0 && playQueue[prev].type === 'commercial') prev--;
  if (prev < 0) prev = 0;
  if (isPlaying) speechSynthesis.cancel();
  queueIndex = prev;
  updateSegmentDisplay();
}

function updateSegmentDisplay() {
  const item = playQueue[queueIndex];
  if (item && item.type === 'segment') {
    const label = `${item.index + 1}/${episodeSegments.length}`;
    document.getElementById('segDisplay').textContent = `Seg ${label}`;
    document.getElementById('statPlaying').textContent = `📻 Segment ${label}`;
    document.getElementById('segPlay').textContent = label;
  } else {
    document.getElementById('segPlay').textContent = '📢';
  }
}

// ──────────────────────────────────────
// SCREEN & SLEEP LOCK
// ──────────────────────────────────────
async function toggleScreenLock() {
  screenLocked = !screenLocked;
  const btn = document.getElementById('btnScreen');
  if (screenLocked) {
    btn.classList.add('active');
    btn.textContent = '📱 AWAKE ON';
    // Use Wake Lock API if available
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => {
        screenLocked = false;
        btn.classList.remove('active');
        btn.textContent = '📱 AWAKE';
      });
    } catch(e) { /* not supported */ }
  } else {
    btn.classList.remove('active');
    btn.textContent = '📱 AWAKE';
    if (wakeLock) {
      wakeLock.release();
      wakeLock = null;
    }
  }
}

function toggleSleepLock() {
  sleepLocked = !sleepLocked;
  const btn = document.getElementById('btnSleep');
  if (sleepLocked) {
    btn.classList.add('active');
    btn.textContent = '💤 NOSLEEP ON';
    // Play silent audio to prevent sleep
    if (!window._sleepAudio) {
      window._sleepAudio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==");
      window._sleepAudio.loop = true;
    }
    window._sleepAudio.play().catch(() => {});
  } else {
    btn.classList.remove('active');
    btn.textContent = '💤 NOSLEEP';
    if (window._sleepAudio) {
      window._sleepAudio.pause();
    }
  }
}

// ──────────────────────────────────────
// MENU TOGGLE
// ──────────────────────────────────────
document.getElementById('menuToggle').addEventListener('click', () => {
  const display = document.getElementById('display-area');
  display.classList.toggle('menu-hidden');
  const btn = document.getElementById('menuToggle');
  btn.textContent = display.classList.contains('menu-hidden') ? '▶' : '◀';
});

// ──────────────────────────────────────
// EVENT LISTENERS
// ──────────────────────────────────────
document.getElementById('btnPlay').addEventListener('click', togglePlayStop);

// Three-button nav: « back, MIDDLE play/stop, » forward
document.getElementById('segBack').addEventListener('click', skipBackward);
document.getElementById('segFwd').addEventListener('click', skipForward);
document.getElementById('segPlay').addEventListener('click', () => {
  if (!isPlaying) {
    // Start playing from current segment
    isPlaying = true;
    document.getElementById('btnPlay').textContent = '■ STOP';
    document.getElementById('btnPlay').classList.add('active');
    processQueue();
  } else {
    stopPlayback();
  }
});
document.getElementById('btnScreen').addEventListener('click', toggleScreenLock);
document.getElementById('btnSleep').addEventListener('click', toggleSleepLock);

document.getElementById('episodeSelect').addEventListener('change', async (e) => {
  if (e.target.value && isPlaying) {
    stopPlayback();
    await new Promise(r => setTimeout(r, 200));
    await startEpisode(e.target.value);
  }
});

// ──────────────────────────────────────
// ANIMATION LOOP
// ──────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  particleTime += dt;

  // Smooth particle energy transition
  currentParticleEnergy += (targetParticleEnergy - currentParticleEnergy) * 4 * dt;

  // Update particles
  const pos = particles.geometry.attributes.position.array;
  const sizes = particles.geometry.attributes.size.array;
  const cols = particles.geometry.attributes.color.array;

  for (let i = 0; i < particleCount; i++) {
    const bx = particleBasePositions[i*3];
    const by = particleBasePositions[i*3+1];
    const bz = particleBasePositions[i*3+2];

    // Orbital motion around radio — slingshot slow-fast-slow with energy
    const orbitSpeed = 0.3 + currentParticleEnergy * 1.5;
    const rawAngle = particleTime * orbitSpeed + i * 0.7;
    // Slingshot curve: sin transforms constant speed into slow→fast→slow cycles
    const slingshot = Math.sin(rawAngle * 0.6);
    const angle = rawAngle + slingshot * 0.9; // Stretch creates visible dwell points
    const radius = Math.sqrt(bx*bx + bz*bz);
    const baseAngle = Math.atan2(bz, bx);
    
    pos[i*3] = Math.cos(baseAngle + angle * 0.15) * radius + particleVelocities[i*3] * currentParticleEnergy * 3;
    pos[i*3+1] = by + Math.sin(particleTime * 1.5 + i) * 0.15 * currentParticleEnergy + particleVelocities[i*3+1] * currentParticleEnergy * 2;
    pos[i*3+2] = Math.sin(baseAngle + angle * 0.15) * radius + particleVelocities[i*3+2] * currentParticleEnergy * 3;

    // Size pulses with energy
    sizes[i] = (0.015 + Math.random() * 0.02) + currentParticleEnergy * 0.06;

    // Color shifts with energy
    const baseGold = particleColorsArr[Math.floor(i % particleColorsArr.length)];
    cols[i*3] = baseGold[0] * (0.6 + currentParticleEnergy * 0.5);
    cols[i*3+1] = baseGold[1] * (0.5 + currentParticleEnergy * 0.4);
    cols[i*3+2] = baseGold[2] * (0.4 + currentParticleEnergy * 0.3);
  }
  particles.geometry.attributes.position.needsUpdate = true;
  particles.geometry.attributes.size.needsUpdate = true;
  particles.geometry.attributes.color.needsUpdate = true;

  // Rotate dial needle when "playing"
  if (isPlaying && !isPaused && radioGroup.userData.needle) {
    radioGroup.userData.needle.rotation.z += dt * 1.8;
  }

  // Subtle radio float
  radioGroup.position.y = Math.sin(particleTime * 0.5) * 0.08;
  radioGroup.rotation.y = Math.sin(particleTime * 0.3) * 0.04;

  // Dial light intensity pulses with speech energy
  dialLight.intensity = 2.0 + currentParticleEnergy * 1.8;

  renderer.render(scene, camera);
}

// ──────────────────────────────────────
// RESPONSIVE CAMERA
// ──────────────────────────────────────
function resize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  
  // Adjust camera for portrait vs landscape
  if (window.innerWidth < window.innerHeight) {
    camera.position.set(0, 1.4, 6.5);
    camera.lookAt(0, 0.3, 0);
  } else {
    camera.position.set(0, 1.8, 5.5);
    camera.lookAt(0, 0.4, 0);
  }
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));

// ──────────────────────────────────────
// INIT
// ──────────────────────────────────────
resize();
animate();
console.log('🎙 Aegis Radio V3.11 — Ready');
console.log(`🌐 ${isEdge ? 'Edge — Zira voice' : 'Chrome — Google voice'} | ${EPISODE_MANIFEST.length} episodes`);
console.log('⚡ Carr-Forge Powered | Open Source | Aegis Certified');
</script>
