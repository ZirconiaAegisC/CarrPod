version: "3.9"

services:
  foundry-api:
    image: node:20-alpine
    working_dir: /app
    command: ["node", "server.js"]
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://aegis:aegis_dev@foundry-db:5432/aegis_citadel
      - REDIS_URL=redis://foundry-redis:6379
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
    volumes:
      - ../../FOUNDRY:/app
    depends_on:
      foundry-db:
        condition: service_healthy
      foundry-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - aegis-citadel

  foundry-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=aegis
      - POSTGRES_PASSWORD=aegis_dev
      - POSTGRES_DB=aegis_citadel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis_citadel"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aegis-citadel

  foundry-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aegis-citadel

  render-web:
    image: node:20-alpine
    working_dir: /app
    command: ["npm", "run", "dev"]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api/v1
    volumes:
      - ../../RENDER:/app
    depends_on:
      foundry-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - aegis-citadel

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - aegis-citadel

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=aegis_admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ../monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
    networks:
      - aegis-citadel

volumes:
  pgdata:
  prometheus_data:
  grafana_data:

networks:
  aegis-citadel:
    driver: bridge
