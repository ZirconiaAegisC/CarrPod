global:
  scrape_interval: 5s
  evaluation_interval: 5s
  scrape_timeout: 4s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "aegis-foundry-api"
    metrics_path: /metrics
    static_configs:
      - targets:
          - foundry-api:3001
    relabel_configs:
      - target_label: service
        replacement: foundry-api
      - target_label: director
        replacement: "0020"

  - job_name: "aegis-render-web"
    metrics_path: /metrics
    static_configs:
      - targets:
          - render-web:3000
    relabel_configs:
      - target_label: service
        replacement: render-web
      - target_label: director
        replacement: "0021"

  - job_name: "aegis-agent-heartbeats"
    metrics_path: /health
    static_configs:
      - targets:
          - foundry-api:3001
          - render-web:3000
    relabel_configs:
      - target_label: type
        replacement: heartbeat

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
